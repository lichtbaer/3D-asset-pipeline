[mypy]
strict = true
python_version = 3.12
plugins = pydantic.mypy

# Pre-existing: app.schemas.generation wird via app.schemas.__init__ geladen
[mypy-app.schemas.generation]
disable_error_code = type-arg

# FastAPI-Router: Decorator-Typen + fehlende Return-Annotations (bekannte Limitation)
[mypy-app.routers.agents]
disable_error_code = untyped-decorator,no-untyped-def

[mypy-app.routers.assets]
disable_error_code = untyped-decorator,no-untyped-def

[mypy-app.routers.generation]
disable_error_code = untyped-decorator,no-untyped-def

[mypy-app.routers.presets]
disable_error_code = untyped-decorator,no-untyped-def

[mypy-app.routers.sketchfab]
disable_error_code = untyped-decorator,no-untyped-def

[mypy-app.routers.storage]
disable_error_code = untyped-decorator,no-untyped-def

# python-json-logger hat keine Typ-Stubs
[mypy-app.logging_config]
disable_error_code = name-defined,misc,no-untyped-def

# torch optional dependency, may not be installed
[mypy-app.providers.rigging.unirig_local]
disable_error_code = import-not-found

# Third-party libs without stubs/py.typed
[mypy-app.services.mesh_providers.triposr]
disable_error_code = import-untyped

[mypy-app.services.mesh_providers.trellis2]
disable_error_code = import-untyped

[mypy-app.services.mesh_providers.hunyuan3d]
disable_error_code = import-untyped

[mypy-app.services.bgremoval_providers.rembg_local]
disable_error_code = import-untyped

[mypy-app.services.bgremoval_providers.birefnet_hf]
disable_error_code = import-untyped

# open3d/trimesh: keine vollständigen Typ-Stubs
[mypy-app.services.mesh_export_service]
disable_error_code = import-untyped,no-untyped-call

[mypy-app.services.mesh_processing_service]
disable_error_code = import-untyped,no-untyped-call

[mypy-app.providers.animation.hymotion_provider]
disable_error_code = import-untyped

[mypy-app.providers.rigging.unirig_provider]
disable_error_code = import-untyped
