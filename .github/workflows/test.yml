name: Test

on:
  push:
    branches: [main, cursor/*, claude/*]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: purzel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d purzel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/purzel
        run: alembic upgrade head

      - name: Run pytest with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/purzel
          LOG_PATH: /tmp/purzel-test/logs
          ASSETS_STORAGE_PATH: /tmp/purzel-test/assets
          PRESETS_STORAGE_PATH: /tmp/purzel-test/presets
        run: |
          mkdir -p /tmp/purzel-test/logs /tmp/purzel-test/assets /tmp/purzel-test/presets
          pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70

      - name: Run mypy
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/purzel
        run: python -m mypy app --strict

      - name: Run ruff
        run: python -m ruff check app

      - name: Run pip-audit
        run: |
          mkdir -p ../docs
          python -m pip_audit -l --format=json -o ../docs/pip-audit-results.json
          python -m pip_audit -l

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

      - name: Run ESLint
        run: npm run lint

      - name: Run npm audit
        run: npm audit --audit-level=high
