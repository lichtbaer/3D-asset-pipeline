services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: purzel
    volumes:
      - purzel-db-data:/var/lib/postgresql/data
    networks:
      - purzel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d purzel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./storage/meshes:/app/storage/meshes
      - ./storage/bgremoval:/app/storage/bgremoval
      - ./storage/rembg_cache:/app/storage/rembg_cache
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/purzel
      - PICSART_API_KEY=${PICSART_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - U2NET_HOME=/app/storage/rembg_cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - purzel-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - purzel-net
    command: npm run dev -- --host 0.0.0.0

volumes:
  purzel-db-data:

networks:
  purzel-net:
    driver: bridge
