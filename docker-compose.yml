services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: purzel
    volumes:
      - purzel-db-data:/var/lib/postgresql/data
    networks:
      - purzel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d purzel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Optional: GPU für UniRig (Lokal) aktivieren — auskommentiert, Stack läuft ohne GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    volumes:
      - ./api:/app
      - ./storage/meshes:/app/storage/meshes
      - ./storage/bgremoval:/app/storage/bgremoval
      - ./storage/assets:/app/storage/assets
      - ./storage/animations:/app/storage/animations
      - ./storage/rembg_cache:/app/storage/rembg_cache
      - ./storage/logs:/app/storage/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/purzel
      - PICSART_API_KEY=${PICSART_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - PIAPI_API_KEY=${PIAPI_API_KEY:-}
      - U2NET_HOME=/app/storage/rembg_cache
      - UNIRIG_MODEL_PATH=${UNIRIG_MODEL_PATH:-./models/unirig/}
      - UNIRIG_REPO_PATH=${UNIRIG_REPO_PATH:-./unirig/}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - purzel-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - purzel-net
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # Blender 4.2 LTS headless – für Rigging-PoC (SMA-172)
  # Leichtgewichtiges Image via Tarball (~400MB vs. blenderkit ~800MB)
  blender:
    build:
      context: ./blender
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    networks:
      - purzel-net
    # Kein dauerhafter Prozess – wird per `docker compose run blender ...` ausgeführt
    profiles:
      - tools

volumes:
  purzel-db-data:

networks:
  purzel-net:
    driver: bridge
